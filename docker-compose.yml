version: '3.9'

services:
  db:
    image: mysql:8
    container_name: dm_toolkit_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dm_toolkit}
      MYSQL_USER: ${MYSQL_USER:-dm_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dm_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
